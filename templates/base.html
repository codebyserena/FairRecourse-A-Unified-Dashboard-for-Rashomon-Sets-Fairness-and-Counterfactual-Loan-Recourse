<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairRecourse Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">
            <h2>FairRecourse</h2>
            <p>ML Dashboard</p>
        </div>
        <ul class="nav-links">
            <li><a class="{% if request.path == '/' %}active{% endif %}" href="/">Overview</a></li>
            <li><a class="{% if request.path == '/rashomon' %}active{% endif %}" href="/rashomon">Rashomon Explorer</a></li>
            <li><a class="{% if request.path == '/recourse' %}active{% endif %}" href="/recourse">Recourse Generator</a></li>
            <li><a class="{% if request.path == '/fairness' %}active{% endif %}" href="/fairness">Fairness Audit</a></li>
            <li><a class="{% if request.path == '/summary' %}active{% endif %}" href="/summary">Project Summary</a></li>
        </ul>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
